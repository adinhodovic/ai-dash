name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
    name: Test
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Go
        id: go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.25

      - name: Golang CI Lint
        uses: golangci/golangci-lint-action@v8
        with:
          install-mode: goinstall
          version: latest

      - name: Build
        run: make build

      - name: Run unit tests
        run: go test ./... -v -covermode=count -coverprofile=coverage.txt

  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'release'
    needs:
      - test
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Go
        id: go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.25

      - name: Build Binaries
        run: make build-all

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ai-dash-linux-amd64
            ai-dash-linux-arm64
