name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published

permissions: read-all

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
    name: Test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        id: go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ^1.25

      - name: Golang CI Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          install-mode: goinstall
          version: latest

      - name: Build
        run: make build

      - name: Run unit tests
        run: go test ./... -v -covermode=count -coverprofile=coverage.txt

      - name: Verify config schema is up to date
        run: |
          go run ./cmd/ai-dash schema > config.schema.json.tmp
          diff config.schema.json config.schema.json.tmp || (echo "config.schema.json is outdated — run 'go run ./cmd/ai-dash schema > config.schema.json'" && exit 1)
          rm config.schema.json.tmp

  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'release'
    needs:
      - test
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        id: go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ^1.25

      - name: Build Binaries
        run: make build-all

      - name: Upload Artifacts
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ai-dash-linux-amd64
            ai-dash-linux-arm64
